name: CodeQL

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '27 4 * * 1'   # weekly, Monday 04:27 UTC

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab
  actions: read

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # 'security-and-quality' adds maintainability/style queries on top of security
          queries: security-and-quality

      # Manual build so CodeQL sees all modules; skip tests for speed
      - name: Build
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests clean compile

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          output: sarif-results

      # Honor in-source `// codeql[<id>]` suppression comments. GitHub code scanning does not
      # dismiss from those natively, so this reads the SARIF suppressions and dismisses the
      # matched alerts as "won't fix" (and re-opens any no longer suppressed). Default branch
      # only — dismissal is a repo-wide property. Pinned to the v2 commit SHA.
      - name: Dismiss in-source suppressed alerts
        if: github.ref == 'refs/heads/master'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8
        with:
          sarif-id: ${{ steps.analyze.outputs.sarif-id }}
          sarif-file: sarif-results
        env:
          GITHUB_TOKEN: ${{ github.token }}
