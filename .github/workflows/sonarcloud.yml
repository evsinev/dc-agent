name: SonarCloud

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history so Sonar computes new-code / blame correctly

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      # Build with coverage, then run the Sonar scanner goal.
      # JaCoCo is already configured in the root pom.
      - name: Build, test with coverage and analyze
        env:
          # Create these on sonarcloud.io after importing the repo:
          #   SONAR_TOKEN  -> repo secret
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          ./mvnw --batch-mode --no-transfer-progress verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=evsinev_dc-agent
          -Dsonar.organization=evsinev
          -Dsonar.host.url=https://sonarcloud.io
