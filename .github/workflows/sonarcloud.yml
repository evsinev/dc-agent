name: SonarCloud

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0   # full history so Sonar computes new-code / blame correctly

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      # Build with coverage, then run the Sonar scanner goal.
      # JaCoCo is already configured in the root pom.
      - name: Build, test with coverage and analyze
        env:
          # Create these on sonarcloud.io after importing the repo:
          #   SONAR_TOKEN  -> repo secret
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          ./mvnw --batch-mode --no-transfer-progress verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=evsinev_dc-agent
          -Dsonar.organization=evsinev
          -Dsonar.host.url=https://sonarcloud.io
