name: Dependency Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '15 5 * * 1'   # weekly refresh so new CVEs get caught

permissions:
  contents: read
  security-events: write

jobs:
  owasp:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Build once so Dependency-Check scans the resolved classpath / jars
      - name: Package (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests clean package

      # Cache the NVD data feed between runs (it is large)
      - name: Cache NVD DB
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: dc-agent
          path: '.'
          format: 'SARIF'
          # NVD now requires an API key to avoid heavy rate limiting.
          # Get one free at https://nvd.nist.gov/developers/request-an-api-key
          # then add it as repo secret NVD_API_KEY.
          # --suppression applies the triaged false-positives in owasp-suppressions.xml
          # (same file the local check-owasp.sh uses).
          args: >-
            --scan .
            --failOnCVSS 8
            --enableRetired
            --suppression ./owasp-suppressions.xml
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif

      - name: Upload full report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (dependencies + misconfig + secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'   # report, don't fail the build (flip to 1 to enforce)

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
